<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cozy Journeys is a personal travel journal for collecting
    favorite destinations, photographs, moods and memories">
    <title>Cozy Journeys</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-content">

            <p class="header-label">My Travel Scrapbook</p>

            <h1>Cozy Journeys</h1>

            <p class="header-subtitle">A little corner for the places, feelings and moments worth remembering.</p>

        </div>
    </header>

    <main class="journal-layout">
        <aside class="entry-panel" aria-labelledby="entryPanelTitle">

            <div class="panel-heading">
                <p class="panel-label">New Memory</p>
                <h2 id="entryPanelTitle">Add a journey</h2>
            </div>

            <div class="entry-form-container">
                <form id="journalForm" class="journal-form">
                    <div class="form-field">
                        <label for="destination">Destination</label>
                        <input id="desitnation" name="destination" type="text"
                        placeholder="Where did you wander?" autocomplete="off" required>
                    </div>

                    <div class="form-field">
                        <label for="journeyDate">Date</label>
                        <input id="journeyDate" name="date" type="date" required>
                    </div>

                    <div class="form-field">
                        <label for="mood">Mood</label>
                        
                        <div class="select-wrapper">

                            <select id="mood" name="mood" required>

                                <option value="" selected disabled>How did it feel?</option>
                                <option value="Peaceful">Peaceful</option>

                                <option value="Joyful">Joyful</option>

                                <option value="Adventurous">Adventurous</option>

                                <option value="Dreamy">Dreamy</option>

                                <option value="Nostalgic">Nostalgic</option>

                                <option value="Restful">Restful</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-field">
                        
                        <label for="photoUrl">Photo URL</label>
                        <input id="photoUrl" name="photoUrl" type="url" 
                        placeholder="Paste favorite photo link" autocomplete="url" required>
                    </div>

                    <div class="form-field">
                        
                        <label for="description">Journal Note</label>
                        <textarea id="description" name="description" rows="7"
                        placeholder="Write down the small details you want to remember..." required></textarea>

                    </div>

                    <button class="submit-button" type="submit">Pin to Journal</button>
        
                </form>
            </div>
        </aside>

        <section class="scrapbook=panel" aria-labelledby="scrapbookTitle">

            <div class="panel-heading">
                <p class="panel-label">Collected Moments</p>
                <h2 id="scrapbookTitle">My Scrapbook</h2>
            </div>

            <div id="journalGallery" class="journal-gallery" aria-live="polite"></div>
        </section>
    </main>

    <script src="app.js"></script>

</body>
</html>
